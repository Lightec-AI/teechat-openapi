# Guest nginx — HTTP-01 only (no TLS). Installed on prod-openapi.
# openapi-acme webroot: /var/www/acme
# Host proxies openapi.teechat.ai:80 /.well-known/acme-challenge/ → guest :80

server {
  listen 80 default_server;
  server_name openapi.teechat.ai _;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/acme;
    default_type text/plain;
  }

  location / {
    return 404;
  }
}
