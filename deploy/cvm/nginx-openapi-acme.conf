# Minimal nginx for ACME HTTP-01 inside prod-openapi guest.
# certbot webroot: /var/www/certbot
# Only static challenge files under /.well-known/acme-challenge/ — see TeeChat docs/ops/openapi-acme-http01-security.md

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name openapi.teechat.ai;

  root /var/www/certbot;

  location /.well-known/acme-challenge/ {
    allow all;
  }

  location / {
    return 404;
  }
}
