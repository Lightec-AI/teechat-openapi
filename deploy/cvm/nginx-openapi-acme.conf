# Minimal nginx for ACME HTTP-01 inside prod-openapi guest.
# certbot webroot: /var/www/certbot
# Install: scripts/ops/install-openapi-cvm-acme.sh (guest) or openapi-letsencrypt-ceremony.sh

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name openapi.teechat.ai;

  root /var/www/certbot;

  location /.well-known/acme-challenge/ {
    allow all;
  }

  location / {
    return 404;
  }
}
