name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Path dep → ../../../attested-mtls. actions/checkout forbids path: ../…;
      # checkout inside workspace then symlink to the sibling Cargo expects.
      - uses: actions/checkout@v5
        with:
          repository: Lightec-AI/teechat-attested-mtls
          path: _attested-mtls
      - name: Symlink attested-mtls sibling for Cargo path dep
        run: ln -sfn "$GITHUB_WORKSPACE/_attested-mtls" "$GITHUB_WORKSPACE/../attested-mtls"
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  build-release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: Lightec-AI/teechat-attested-mtls
          path: _attested-mtls
      - name: Symlink attested-mtls sibling for Cargo path dep
        run: ln -sfn "$GITHUB_WORKSPACE/_attested-mtls" "$GITHUB_WORKSPACE/../attested-mtls"
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - name: build openapi binary
        run: cargo build --release -p openapi
